name: Docs

# Build the mdBook and (on main) deploy it to GitHub Pages.
#
# To serve it at docs.beeboyd.com: add a CNAME record pointing
# docs.beeboyd.com -> beeboyd.github.io, set the custom domain in the repo Pages
# settings, and commit a docs/CNAME file with `docs.beeboyd.com`.

on:
  push:
    branches: [main]
    paths: ["docs/**", ".github/workflows/docs.yml"]
  pull_request:
    paths: ["docs/**"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build book
        run: mdbook build docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/book

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

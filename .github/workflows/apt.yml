name: apt (.deb)

# Stub: builds the ripsync .deb and uploads it as an artifact. It does NOT sign
# or publish to a live APT repository — see packaging/apt/README.md for how to
# add GPG signing and a Pages deploy.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-deb --locked
      - run: ./packaging/deb/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ripsync-deb
          path: target/debian/*.deb
